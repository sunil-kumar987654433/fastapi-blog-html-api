{% extends 'layout.html' %}
{% block title%}
Fatapi-blog | {{title}}
{% endblock title %}

 {% block css %}
  <link href="{{ url_for("static", path='website/accounts/css/index.css')}}" rel="stylesheet" type="text/css">

  {% endblock css %}

{% block content%}
<div class="container mt-4">
  <div class="row">
    {% for post in posts %}
      <div class="col-md-4 mb-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">
              <a href="{{ url_for('post', post_id=post.id) }}" class="text-decoration-none">
                {{ post.name }}
              </a>
            </h5>
            <p class="card-text">
              Age: {{ post.age }}
            </p>
          </div>
          <div class="card-footer bg-transparent border-0">
            <a href="{{ url_for('post', post_id=post.id) }}" class="btn btn-primary btn-sm">
              View Details
            </a>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock content %}

{% block js%}
  <script src="{{ url_for('static', path='website/accounts/js/index.js')}}"></script>

  {% endblock js%}
