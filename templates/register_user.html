{% extends 'layout.html' %}

{% block title %}
Register
{% endblock title %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Create Account
                    </h2>

                    <form id="registerForm">

                        <!-- Email -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email" id="email" class="form-control" placeholder="Enter email" required>

                        </div>

                        <!-- Password -->
                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password" id="password1" class="form-control" placeholder="Enter password"
                                required>

                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input type="password" id="password2" class="form-control" placeholder="Confirm password"
                                required>

                        </div>

                        <!-- Button -->
                        <button type="submit" class="btn btn-primary w-100">
                            Register
                        </button>

                    </form>

                    <!-- Login -->
                    <div class="text-center mt-4">

                        <small>
                            Already have an account?
                        </small>

                        <a href="{{url_for('login-user-form')}}">
                            Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock content %}

{% block js %}
<script>
    const REGISTER_URL = "{{url_for('register-new-user')}}"
</script>
<script src="{{ url_for('static', path='website/accounts/js/register_user.js')}}"></script>

{% endblock js %}
